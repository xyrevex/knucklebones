<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knucklebones</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

    :root {
        --bg-color: #0b0b0b;
        --gold: #d4af37;
        --sprite-src: url('https://raw.githubusercontent.com/xyrevex/knucklebones/main/sprite_sheet.png');
    }

    body {
        background-color: var(--bg-color);
        color: #f2e9dc;
        font-family: 'Cinzel', serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
        user-select: none;
    }

    h1 {
        color: var(--gold);
        text-shadow: 0 0 10px var(--gold);
        margin: 10px 0;
        font-size: 36px;
    }

    button {
        background: #1a1a1a;
        color: #fff;
        font-family: 'Cinzel', serif;
        font-size: 20px;
        padding: 12px 30px;
        border: 2px solid var(--gold);
        cursor: pointer;
        transition: 0.2s;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    button:hover {
        background: var(--gold);
        color: #000;
        box-shadow: 0 0 15px var(--gold);
    }

    button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        box-shadow: none;
    }

    .arena {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        transform: scale(0.65);
        transform-origin: top center;
        margin-top: 20px;
    }

    .player-zone {
        position: relative;
        width: 800px;
        height: 544px;
    }

    .board-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 800px;
        height: 544px;
        background-image: var(--sprite-src);
        background-position: -6px -5px;
        z-index: 0;
    }

    .die {
        width: 244px;
        height: 244px;
        background-image: var(--sprite-src);
        background-repeat: no-repeat;
    }

    .d1 { background-position: -5px -556px; }
    .d2 { background-position: -255px -556px; }
    .d3 { background-position: -505px -556px; }
    .d4 { background-position: -5px -806px; }
    .d5 { background-position: -255px -806px; }
    .d6 { background-position: -505px -806px; }

    .grid-layer {
        position: absolute;
        top: 30px;
        left: 40px;
        width: 720px;
        height: 480px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        z-index: 10;
    }

    .column {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        cursor: pointer;
        padding-top: 20px;
    }

    .column:hover {
        background: rgba(212, 175, 55, 0.05);
    }

    .placed-die {
        width: 244px;
        height: 244px;
        transform: scale(0.6);
        margin-top: -85px;
        margin-bottom: -85px;
        background-image: var(--sprite-src);
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        transition: all 0.3s ease;
    }

    .placed-die:first-child {
        margin-top: 0;
    }

    .hud {
        position: absolute;
        top: -60px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        font-size: 32px;
        color: var(--gold);
        text-transform: uppercase;
        text-shadow: 0 2px 4px #000;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        display: flex;
        gap: 30px;
        align-items: center;
        background: rgba(0,0,0,0.9);
        padding: 20px 40px;
        border: 2px solid var(--gold);
        border-radius: 12px;
        z-index: 100;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .roll-box {
        width: 100px;
        height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #333;
        background: #000;
    }

    .preview-die {
        transform: scale(0.35);
    }

    .status-text {
        font-size: 24px;
        min-width: 200px;
        text-align: center;
        color: #ccc;
    }

    .highlight {
        animation: flash 0.5s ease;
    }

    @keyframes flash {
        0% { filter: brightness(1); }
        50% { filter: brightness(2) sepia(1); }
        100% { filter: brightness(1); }
    }

</style>
</head>
<body>

<h1>KNUCKLEBONES</h1>

<div class="arena">
    <div class="player-zone">
        <div class="hud">
            <span>Opponent</span>
            <span><span id="score-p2">0</span></span>
        </div>
        <div class="board-bg"></div>
        <div class="grid-layer" id="grid-p2"></div>
    </div>

    <div class="player-zone">
        <div class="hud">
            <span>Player</span>
            <span><span id="score-p1">0</span></span>
        </div>
        <div class="board-bg"></div>
        <div class="grid-layer" id="grid-p1">
            <div class="column" onclick="handleInput(0)"></div>
            <div class="column" onclick="handleInput(1)"></div>
            <div class="column" onclick="handleInput(2)"></div>
        </div>
    </div>
</div>

<div class="controls">
    <div class="status-text" id="status">PLAYER START</div>
    <div class="roll-box" id="active-die"></div>
    <button id="btn-roll" onclick="rollDice()">ROLL</button>
</div>

<script>
    const state = {
        p1: [[], [], []],
        p2: [[], [], []],
        turn: 1,
        diceValue: 0,
        gameOver: false
    };

    function rollDice() {
        if (state.diceValue !== 0 || state.gameOver || state.turn === 2) return;

        let count = 0;
        const interval = setInterval(() => {
            const face = Math.ceil(Math.random() * 6);
            renderPreview(face);
            count++;
            if (count > 8) {
                clearInterval(interval);
                state.diceValue = Math.ceil(Math.random() * 6);
                renderPreview(state.diceValue);
                setStatus("SELECT A COLUMN");
            }
        }, 50);
    }

    function handleInput(colIndex) {
        if (state.turn !== 1 || state.diceValue === 0 || state.gameOver) return;
        
        if (state.p1[colIndex].length < 3) {
            executeMove(1, colIndex, state.diceValue);
        } else {
            setStatus("COLUMN FULL!");
        }
    }

    function aiTurn() {
        setStatus("OPPONENT THINKING...");
        document.getElementById('btn-roll').disabled = true;

        setTimeout(() => {
            let count = 0;
            const interval = setInterval(() => {
                const face = Math.ceil(Math.random() * 6);
                renderPreview(face);
                count++;
                if (count > 8) {
                    clearInterval(interval);
                    const val = Math.ceil(Math.random() * 6);
                    renderPreview(val);
                    
                    setTimeout(() => {
                        const validCols = [0, 1, 2].filter(i => state.p2[i].length < 3);
                        if (validCols.length > 0) {
                            const choice = validCols[Math.floor(Math.random() * validCols.length)];
                            executeMove(2, choice, val);
                        }
                    }, 800);
                }
            }, 50);
        }, 500);
    }

    function executeMove(player, col, val) {
        const board = player === 1 ? state.p1 : state.p2;
        const enemyBoard = player === 1 ? state.p2 : state.p1;

        board[col].push(val);

        let destroyed = false;
        enemyBoard[col] = enemyBoard[col].filter(v => {
            if (v === val) {
                destroyed = true;
                return false;
            }
            return true;
        });

        state.diceValue = 0;
        document.getElementById('active-die').innerHTML = '';
        renderBoards();

        if (checkFull(state.p1) || checkFull(state.p2)) {
            endGame();
        } else {
            state.turn = state.turn === 1 ? 2 : 1;
            if (state.turn === 1) {
                setStatus("YOUR TURN");
                document.getElementById('btn-roll').disabled = false;
            } else {
                aiTurn();
            }
        }
    }

    function checkFull(board) {
        let total = 0;
        for (let col of board) total += col.length;
        return total === 9;
    }

    function calculateScore(board) {
        let total = 0;
        for (let col of board) {
            const counts = {};
            col.forEach(n => counts[n] = (counts[n] || 0) + 1);
            for (let n in counts) {
                total += n * counts[n] * counts[n];
            }
        }
        return total;
    }

    function renderBoards() {
        drawGrid(state.p1, 'grid-p1');
        drawGrid(state.p2, 'grid-p2');
        document.getElementById('score-p1').innerText = calculateScore(state.p1);
        document.getElementById('score-p2').innerText = calculateScore(state.p2);
    }

    function drawGrid(boardData, elementId) {
        const container = document.getElementById(elementId);
        if (elementId === 'grid-p2') {
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const colDiv = document.createElement('div');
                colDiv.className = 'column';
                boardData[i].forEach(val => {
                    const die = document.createElement('div');
                    die.className = `placed-die d${val}`;
                    colDiv.appendChild(die);
                });
                container.appendChild(colDiv);
            }
        } else {
            const cols = container.children;
            for (let i = 0; i < 3; i++) {
                cols[i].innerHTML = '';
                boardData[i].forEach(val => {
                    const die = document.createElement('div');
                    die.className = `placed-die d${val}`;
                    cols[i].appendChild(die);
                });
            }
        }
    }

    function renderPreview(val) {
        const box = document.getElementById('active-die');
        box.innerHTML = `<div class="die d${val} preview-die"></div>`;
    }

    function setStatus(msg) {
        document.getElementById('status').innerText = msg;
    }

    function endGame() {
        state.gameOver = true;
        const s1 = calculateScore(state.p1);
        const s2 = calculateScore(state.p2);
        let msg = s1 > s2 ? "VICTORY!" : (s1 < s2 ? "DEFEAT" : "DRAW");
        setStatus(msg);
        document.getElementById('btn-roll').innerText = "RESET";
        document.getElementById('btn-roll').disabled = false;
        document.getElementById('btn-roll').onclick = () => location.reload();
    }

    renderBoards();
</script>
</body>
</html>
