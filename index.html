<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knucklebones</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

    :root {
        --bg: #0b0b0b;
        --gold: #d4af37;
        --sprite: url('https://raw.githubusercontent.com/xyrevex/knucklebones/main/sprite_sheet.png');
    }

    body {
        background: var(--bg);
        color: #f2e9dc;
        font-family: 'Cinzel', serif;
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
    }

    #menu {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(11, 11, 11, 0.98);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
        transition: opacity 0.5s;
    }

    h1 {
        color: var(--gold);
        font-size: 5em;
        margin: 0;
        text-shadow: 0 0 30px var(--gold);
        letter-spacing: 5px;
    }

    .btn {
        background: transparent;
        color: #fff;
        font-family: inherit;
        font-size: 1.8em;
        padding: 15px 60px;
        border: 3px solid var(--gold);
        cursor: pointer;
        transition: 0.2s;
        text-transform: uppercase;
    }

    .btn:hover {
        background: var(--gold);
        color: #000;
        box-shadow: 0 0 30px var(--gold);
        transform: scale(1.05);
    }

    #game-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        width: 1000px; 
        height: 1400px;
        transform-origin: center center;
    }

    .hud-row {
        width: 800px;
        display: flex;
        justify-content: space-between;
        font-size: 2.5em;
        color: var(--gold);
        text-transform: uppercase;
        text-shadow: 2px 2px 4px #000;
    }

    .board-container {
        position: relative;
        width: 800px;
        height: 544px;
    }

    .board-bg {
        width: 800px;
        height: 544px;
        background-image: var(--sprite);
        background-position: -6px -5px;
        background-repeat: no-repeat;
        position: absolute;
        top: 0; left: 0;
        z-index: 0;
        filter: drop-shadow(0 10px 20px #000);
    }

    .grid-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 10;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        padding: 40px 60px;
        box-sizing: border-box;
        gap: 30px;
    }

    .column {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 20px;
        cursor: pointer;
        transition: background 0.1s;
        border-radius: 10px;
    }

    .column:hover {
        background: rgba(212, 175, 55, 0.1);
        box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.2);
    }

    .die {
        width: 244px;
        height: 244px;
        background-image: var(--sprite);
        background-repeat: no-repeat;
        transform: scale(0.5); 
        margin-top: -95px;
        margin-bottom: -95px;
        pointer-events: none;
        filter: drop-shadow(0 5px 10px rgba(0,0,0,0.9));
        transition: transform 0.2s;
    }
    
    .die.new { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    @keyframes popIn {
        0% { transform: scale(0); }
        100% { transform: scale(0.5); }
    }

    .d1 { background-position: -5px -556px; }
    .d2 { background-position: -255px -556px; }
    .d3 { background-position: -505px -556px; }
    .d4 { background-position: -5px -806px; }
    .d5 { background-position: -255px -806px; }
    .d6 { background-position: -505px -806px; }

    .die:first-child { margin-top: 0; }

    #control-bar {
        position: fixed;
        bottom: 30px;
        z-index: 1000;
        background: rgba(0,0,0,0.9);
        border: 2px solid var(--gold);
        border-radius: 100px;
        padding: 10px 50px;
        display: flex;
        gap: 40px;
        align-items: center;
        box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }

    #status-text {
        color: #ccc;
        font-size: 24px;
        min-width: 250px;
        text-align: center;
    }

    #current-die-box {
        width: 80px;
        height: 80px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    .preview-die {
        transform: scale(0.35) !important;
        margin: 0 !important;
        position: absolute;
    }

    .hidden { display: none !important; pointer-events: none; }

</style>
</head>
<body>

<div id="menu">
    <h1>KNUCKLEBONES</h1>
    <button class="btn" onclick="startGame(true)">Play vs Bot</button>
    <button class="btn" onclick="startGame(false)">local 2</button>
</div>

<div id="game-stage">
    
    <div>
        <div class="hud-row">
            <span id="p2-name">Opponent</span>
            <span id="score-p2">0</span>
        </div>
        <div class="board-container">
            <div class="board-bg"></div>
            <div class="grid-overlay" id="grid-p2"></div>
        </div>
    </div>

    <div>
        <div class="board-container">
            <div class="board-bg"></div>
            <div class="grid-overlay" id="grid-p1"></div>
        </div>
        <div class="hud-row">
            <span>Player 1</span>
            <span id="score-p1">0</span>
        </div>
    </div>

</div>

<div id="control-bar" class="hidden">
    <div id="status-text">Welcome</div>
    <div id="current-die-box"></div>
    <button class="btn" id="action-btn" onclick="rollDie()">ROLL</button>
</div>

<script>
    const state = {
        p1: [[],[],[]],
        p2: [[],[],[]],
        turn: 1,
        heldDie: 0,
        isBot: false,
        gameOver: false
    };

    function startGame(vsBot) {
        state.isBot = vsBot;
        document.getElementById('p2-name').innerText = vsBot ? "The Fox" : "Player 2";
        document.getElementById('menu').style.opacity = '0';
        
        renderBoard();
        resize();

        setTimeout(() => {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('control-bar').classList.remove('hidden');
            updateStatus("Player 1's Turn");
        }, 500);
    }

    function rollDie() {
        if (state.heldDie !== 0 || state.gameOver) return;
        if (state.isBot && state.turn === 2) return;

        const btn = document.getElementById('action-btn');
        btn.disabled = true;
        
        let frames = 0;
        const anim = setInterval(() => {
            renderPreview(Math.ceil(Math.random() * 6));
            frames++;
            if(frames > 12) {
                clearInterval(anim);
                const val = Math.ceil(Math.random() * 6);
                state.heldDie = val;
                renderPreview(val);
                updateStatus(`Place a ${val}`);
            }
        }, 60);
    }

    function handleColumnClick(player, colIdx) {
        if (state.gameOver || state.heldDie === 0) return;
        if (player !== state.turn) return;
        
        const board = player === 1 ? state.p1 : state.p2;
        if (board[colIdx].length >= 3) {
            updateStatus("Column Full!");
            return;
        }

        commitMove(player, colIdx);
    }

    function commitMove(player, colIdx) {
        const myBoard = player === 1 ? state.p1 : state.p2;
        const oppBoard = player === 1 ? state.p2 : state.p1;
        
        myBoard[colIdx].push(state.heldDie);

        const val = state.heldDie;
        let destroyed = false;
        oppBoard[colIdx] = oppBoard[colIdx].filter(v => {
            if(v === val) { destroyed = true; return false; }
            return true;
        });

        state.heldDie = 0;
        document.getElementById('current-die-box').innerHTML = '';
        document.getElementById('action-btn').disabled = false;
        
        renderBoard();

        if (checkFull(state.p1) || checkFull(state.p2)) {
            endGame();
            return;
        }

        state.turn = state.turn === 1 ? 2 : 1;
        
        if (state.isBot && state.turn === 2) {
            updateStatus("Opponent Thinking...");
            document.getElementById('action-btn').disabled = true;
            setTimeout(botRoutine, 800);
        } else {
            const pName = state.turn === 1 ? "Player 1" : "Player 2";
            updateStatus(`${pName}'s Turn`);
        }
    }

    function botRoutine() {
        let frames = 0;
        const anim = setInterval(() => {
            renderPreview(Math.ceil(Math.random() * 6));
            frames++;
            if(frames > 10) {
                clearInterval(anim);
                const val = Math.ceil(Math.random() * 6);
                state.heldDie = val;
                renderPreview(val);

                setTimeout(() => {
                    const validCols = [0,1,2].filter(i => state.p2[i].length < 3);
                    if(validCols.length === 0) { endGame(); return; }

                    let choice = validCols[Math.floor(Math.random() * validCols.length)];
                    
                    for (let c of validCols) {
                        if (state.p1[c].includes(val)) choice = c;
                    }
                    
                    commitMove(2, choice);
                }, 800);
            }
        }, 50);
    }

    function renderBoard() {
        drawGrid(1);
        drawGrid(2);
        document.getElementById('score-p1').innerText = calcScore(state.p1);
        document.getElementById('score-p2').innerText = calcScore(state.p2);
    }

    function drawGrid(pid) {
        const board = pid === 1 ? state.p1 : state.p2;
        const container = document.getElementById(`grid-p${pid}`);
        container.innerHTML = '';

        for(let i=0; i<3; i++) {
            const colDiv = document.createElement('div');
            colDiv.className = 'column';
            colDiv.onclick = () => handleColumnClick(pid, i);

            board[i].forEach(val => {
                const d = document.createElement('div');
                d.className = `die d${val} new`;
                colDiv.appendChild(d);
            });
            container.appendChild(colDiv);
        }
    }

    function calcScore(board) {
        let total = 0;
        board.forEach(col => {
            const counts = {};
            col.forEach(n => counts[n] = (counts[n] || 0) + 1);
            for(let n in counts) total += n * (counts[n] ** 2);
        });
        return total;
    }

    function checkFull(board) {
        let count = 0;
        board.forEach(c => count += c.length);
        return count === 9;
    }

    function renderPreview(val) {
        document.getElementById('current-die-box').innerHTML = `<div class="die d${val} preview-die"></div>`;
    }

    function updateStatus(msg) {
        document.getElementById('status-text').innerText = msg;
    }

    function endGame() {
        state.gameOver = true;
        const s1 = calcScore(state.p1);
        const s2 = calcScore(state.p2);
        let msg = "DRAW";
        if (s1 > s2) msg = "PLAYER 1 WINS!";
        if (s2 > s1) msg = state.isBot ? "THE FOX WINS!" : "PLAYER 2 WINS!";
        
        updateStatus(msg);
        const btn = document.getElementById('action-btn');
        btn.innerText = "RESTART";
        btn.disabled = false;
        btn.onclick = () => location.reload();
    }

    function resize() {
        const stage = document.getElementById('game-stage');
        const h = window.innerHeight;
        const w = window.innerWidth;
        const scale = Math.min(w / 1100, (h - 20) / 1450); 
        stage.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', resize);

</script>
</body>
</html>
