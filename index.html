<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Knucklebones</title>
<style>
body{
    background:#0b0b0b;
    color:#f2e9dc;
    font-family:'Cinzel', Georgia, serif;
    text-align:center;
    margin:0;
    padding:20px;
}
h1{
    color:#d4af37;
    letter-spacing:4px;
    margin-bottom:20px;
    text-shadow: 0 0 8px #d4af37;
}
#diceBox{
    font-size:60px;
    margin-bottom:15px;
}
button{
    background:#1b1b1b;
    border:3px solid #d4af37;
    color:#f2e9dc;
    padding:12px 24px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:15px;
    border-radius:6px;
}
button:hover{
    background:#262626;
    transform:scale(1.05);
}
.panel{
    background:#1a1a1a;
    padding:20px;
    border:3px solid #d4af37;
    display:inline-block;
    margin-bottom:30px;
    border-radius:8px;
}
.board{
    display:grid;
    grid-template-columns:repeat(3,70px);
    grid-template-rows:repeat(3,70px);
    gap:6px;
    margin-top:10px;
}
.cell{
    background:#111;
    border:2px solid #444;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    cursor:pointer;
    position:relative;
    border-radius:6px;
    transition: transform 0.2s;
}
.cell:hover{
    background:#222;
    transform:scale(1.05);
}
.column-score{
    margin-top:6px;
    font-size:18px;
    color:#d4af37;
}
.turn{
    font-size:22px;
    margin-bottom:15px;
    color:#d4af37;
    text-shadow:0 0 4px #d4af37;
}
@keyframes diceRoll {
    0%{transform:rotate(0deg) scale(1);}
    25%{transform:rotate(20deg) scale(1.2);}
    50%{transform:rotate(-20deg) scale(1.2);}
    75%{transform:rotate(10deg) scale(1.1);}
    100%{transform:rotate(0deg) scale(1);}
}
.bounce{
    animation:diceRoll 0.6s ease;
}
.highlight{
    background:#6a5a2e !important;
    box-shadow:0 0 10px #d4af37;
}
</style>
</head>
<body>

<h1>KNUCKLEBONES</h1>

<div id="diceBox">🎲</div>
<button onclick="roll()">Roll Dice</button>
<div class="turn" id="turn">Player 1's turn</div>

<div class="panel">
<h3>Player 1</h3>
<div id="p1" class="board"></div>
<div id="p1cols" class="column-score"></div>
<div class="score">Total: <span id="s1">0</span></div>
</div>

<div class="panel">
<h3>Player 2</h3>
<div id="p2" class="board"></div>
<div id="p2cols" class="column-score"></div>
<div class="score">Total: <span id="s2">0</span></div>
</div>

<script>
const ROWS=3, COLS=3;
let p1=Array.from({length:ROWS},()=>Array(COLS).fill(0));
let p2=Array.from({length:ROWS},()=>Array(COLS).fill(0));
let turn=1, dice=0, gameOver=false;
const diceEmojis=["⚀","⚁","⚂","⚃","⚄","⚅"];

function draw(){
    let p1b=document.getElementById("p1");
    let p2b=document.getElementById("p2");
    p1b.innerHTML=""; p2b.innerHTML="";
    
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            if(p1[r][c]) cell.textContent=diceEmojis[p1[r][c]-1];
            cell.onclick=()=>place(1,c);
            p1b.appendChild(cell);
        }
    }
    for(let r=0;r<ROWS;r++){
        for(let c=0;c<COLS;c++){
            let cell=document.createElement("div");
            cell.className="cell";
            if(p2[r][c]) cell.textContent=diceEmojis[p2[r][c]-1];
            cell.onclick=()=>place(2,c);
            p2b.appendChild(cell);
        }
    }
    
    document.getElementById("s1").textContent=score(p1);
    document.getElementById("s2").textContent=score(p2);
    
    document.getElementById("p1cols").textContent="Col scores: "+colScores(p1).join(" | ");
    document.getElementById("p2cols").textContent="Col scores: "+colScores(p2).join(" | ");
    
    document.getElementById("turn").textContent="Player "+turn+"'s turn";
}

function roll(){
    if(dice!=0||gameOver)return;
    dice=Math.floor(Math.random()*6)+1;
    const box=document.getElementById("diceBox");
    box.textContent=diceEmojis[dice-1];
    box.classList.add("bounce");
    setTimeout(()=>box.classList.remove("bounce"),600);
}

function place(player,col){
    if(gameOver||player!==turn||dice===0) return;
    let board=player===1?p1:p2;
    let enemy=player===1?p2:p1;
    for(let r=ROWS-1;r>=0;r--){
        if(board[r][col]===0){
            board[r][col]=dice;
            destroy(enemy,col,dice);
            dice=0;
            document.getElementById("diceBox").textContent="🎲";
            if(full(p1)||full(p2)){endGame(); return;}
            turn=turn===1?2:1;
            draw();
            highlightColumn(board,col);
            return;
        }
    }
}

function destroy(board,col,val){
    for(let r=0;r<ROWS;r++){
        if(board[r][col]===val) board[r][col]=0;
    }
}

function columnScore(values){
    let total=0;
    for(let v of [...new Set(values)]){
        let count=values.filter(x=>x===v).length;
        total+=v*(count*count);
    }
    return total;
}

function colScores(board){
    let arr=[];
    for(let c=0;c<COLS;c++){
        let vals=[];
        for(let r=0;r<ROWS;r++) if(board[r][c]) vals.push(board[r][c]);
        arr.push(columnScore(vals));
    }
    return arr;
}

function score(board){
    return colScores(board).reduce((a,b)=>a+b,0);
}

function full(board){
    for(let c=0;c<COLS;c++) if(board[0][c]===0) return false;
    return true;
}

function endGame(){
    gameOver=true;
    draw();
    const s1=score(p1), s2=score(p2);
    if(s1>s2) alert("Player 1 wins "+s1+" vs "+s2);
    else if(s2>s1) alert("Player 2 wins "+s2+" vs "+s1);
    else alert("Draw! "+s1+" vs "+s2);
}

function highlightColumn(board,col){
    const cells=(board===p1?document.getElementById("p1"):document.getElementById("p2")).children;
    for(let r=0;r<ROWS;r++){
        cells[r*COLS+col].classList.add("highlight");
    }
    setTimeout(()=>{
        for(let r=0;r<ROWS;r++){
            cells[r*COLS+col].classList.remove("highlight");
        }
    },800);
}

draw();
</script>
</body>
</html>
