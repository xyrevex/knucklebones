<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knucklebones</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap');

    :root {
        --bg: #0b0b0b;
        --gold: #d4af37;
        --sprite: url('https://raw.githubusercontent.com/xyrevex/knucklebones/main/sprite_sheet.png');
    }

    body {
        background: var(--bg);
        color: #f2e9dc;
        font-family: 'Cinzel', serif;
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none;
    }

    #menu {
        position: absolute;
        z-index: 999;
        background: rgba(0,0,0,0.95);
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
    }

    h1 {
        color: var(--gold);
        font-size: 4em;
        margin: 0;
        text-shadow: 0 0 20px var(--gold);
    }

    .btn {
        background: transparent;
        color: #fff;
        font-family: inherit;
        font-size: 1.5em;
        padding: 15px 40px;
        border: 2px solid var(--gold);
        cursor: pointer;
        transition: 0.2s;
        min-width: 200px;
        text-transform: uppercase;
    }

    .btn:hover {
        background: var(--gold);
        color: #000;
        box-shadow: 0 0 20px var(--gold);
    }

    #game-wrapper {
        transform-origin: center center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .hud {
        width: 800px;
        display: flex;
        justify-content: space-between;
        font-size: 2em;
        color: var(--gold);
        text-transform: uppercase;
        text-shadow: 2px 2px 0 #000;
    }

    .board {
        position: relative;
        width: 800px;
        height: 544px;
        background-image: var(--sprite);
        background-position: -6px -5px;
        filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .grid {
        position: absolute;
        top: 30px;
        left: 40px;
        width: 720px;
        height: 480px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        z-index: 10;
    }

    .column {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 25px;
        cursor: pointer;
        transition: background 0.1s;
    }

    .column:hover {
        background: rgba(212, 175, 55, 0.1);
    }

    .die {
        width: 244px;
        height: 244px;
        background-image: var(--sprite);
        background-repeat: no-repeat;
        transform: scale(0.7);
        margin-top: -75px;
        margin-bottom: -75px;
        pointer-events: none;
        filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8));
    }

    .die:first-child {
        margin-top: 0;
    }

    .d1 { background-position: -5px -556px; }
    .d2 { background-position: -255px -556px; }
    .d3 { background-position: -505px -556px; }
    .d4 { background-position: -5px -806px; }
    .d5 { background-position: -255px -806px; }
    .d6 { background-position: -505px -806px; }

    #controls {
        position: fixed;
        bottom: 30px;
        display: flex;
        align-items: center;
        gap: 20px;
        background: rgba(0,0,0,0.8);
        padding: 15px 30px;
        border: 1px solid var(--gold);
        border-radius: 50px;
        z-index: 100;
    }

    #preview-box {
        width: 80px;
        height: 80px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .mini-die {
        transform: scale(0.35); 
    }

    #status {
        min-width: 200px;
        text-align: center;
        font-size: 1.2em;
        color: #ccc;
    }

    .hidden { display: none !important; }

</style>
</head>
<body>

<div id="menu">
    <h1>KNUCKLEBONES</h1>
    <button class="btn" onclick="startGame(true)">Vs Computer</button>
    <button class="btn" onclick="startGame(false)">Vs Player</button>
</div>

<div id="game-wrapper">
    <!-- Top Player (P2/Bot) -->
    <div class="hud">
        <span id="p2-name">Opponent</span>
        <span id="score-p2">0</span>
    </div>
    <div class="board">
        <div class="grid" id="grid-p2"></div>
    </div>

    <!-- Bottom Player (P1) -->
    <div class="board">
        <div class="grid" id="grid-p1"></div>
    </div>
    <div class="hud">
        <span>Player 1</span>
        <span id="score-p1">0</span>
    </div>
</div>

<div id="controls" class="hidden">
    <div id="status">Roll the dice</div>
    <div id="preview-box"></div>
    <button class="btn" id="roll-btn" onclick="rollDice()">ROLL</button>
</div>

<script>
    const state = {
        p1: [[], [], []],
        p2: [[], [], []],
        turn: 1,
        die: 0,
        isBot: true,
        over: false
    };

    function startGame(vsBot) {
        state.isBot = vsBot;
        document.getElementById('p2-name').innerText = vsBot ? "The Fox" : "Player 2";
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('controls').classList.remove('hidden');
        resizeGame();
        render();
    }

    function rollDice() {
        if (state.die !== 0 || state.over) return;
        
        // If bot mode and it's bot turn, disable button
        if (state.isBot && state.turn === 2) return;

        const btn = document.getElementById('roll-btn');
        btn.disabled = true;

        let rolls = 0;
        const anim = setInterval(() => {
            const val = Math.ceil(Math.random() * 6);
            showPreview(val);
            rolls++;
            if (rolls > 10) {
                clearInterval(anim);
                state.die = Math.ceil(Math.random() * 6);
                showPreview(state.die);
                updateStatus(`Place a ${state.die}`);
            }
        }, 50);
    }

    function handleInput(player, col) {
        if (state.over || state.die === 0) return;
        if (player !== state.turn) return;
        if (state.isBot && player === 2) return; 

        const board = player === 1 ? state.p1 : state.p2;
        
        if (board[col].length < 3) {
            placeDie(player, col);
        } else {
            updateStatus("Column Full!");
        }
    }

    function placeDie(player, col) {
        const board = player === 1 ? state.p1 : state.p2;
        const enemy = player === 1 ? state.p2 : state.p1;

        board[col].push(state.die);
        
        // Destroy Mechanic
        enemy[col] = enemy[col].filter(val => val !== state.die);

        const val = state.die;
        state.die = 0;
        document.getElementById('preview-box').innerHTML = '';
        document.getElementById('roll-btn').disabled = false;
        
        render();

        if (checkFull(state.p1) || checkFull(state.p2)) {
            endGame();
        } else {
            state.turn = state.turn === 1 ? 2 : 1;
            const pName = state.turn === 1 ? "Player 1" : (state.isBot ? "The Fox" : "Player 2");
            updateStatus(`${pName}'s Turn`);
            
            if (state.isBot && state.turn === 2) {
                document.getElementById('roll-btn').disabled = true;
                setTimeout(botTurn, 1000);
            }
        }
    }

    function botTurn() {
        let rolls = 0;
        const anim = setInterval(() => {
            showPreview(Math.ceil(Math.random() * 6));
            rolls++;
            if (rolls > 10) {
                clearInterval(anim);
                const val = Math.ceil(Math.random() * 6);
                showPreview(val);
                state.die = val;
                
                setTimeout(() => {
                    const valid = [0,1,2].filter(i => state.p2[i].length < 3);
                    if(valid.length > 0) {
                        // Smart-ish bot: prioritize columns that destroy P1 dice
                        let best = valid[0];
                        for(let c of valid) {
                            if (state.p1[c].includes(val)) best = c;
                        }
                        placeDie(2, best);
                    }
                }, 800);
            }
        }, 50);
    }

    function checkFull(board) {
        return board.flat().length + board.reduce((a,b)=>a+b.length,0) === 18; // wait, wrong logic
        // Correct: Sum lengths
        let total = 0;
        for(let c of board) total += c.length;
        return total === 9;
    }

    function calcScore(board) {
        let total = 0;
        for(let col of board) {
            let counts = {};
            col.forEach(x => counts[x] = (counts[x] || 0) + 1);
            for(let x in counts) total += x * counts[x] * counts[x];
        }
        return total;
    }

    function render() {
        drawGrid(1);
        drawGrid(2);
        document.getElementById('score-p1').innerText = calcScore(state.p1);
        document.getElementById('score-p2').innerText = calcScore(state.p2);
    }

    function drawGrid(pId) {
        const div = document.getElementById(`grid-p${pId}`);
        div.innerHTML = '';
        const board = pId === 1 ? state.p1 : state.p2;

        for(let i=0; i<3; i++) {
            const colDiv = document.createElement('div');
            colDiv.className = 'column';
            colDiv.onclick = () => handleInput(pId, i);
            
            board[i].forEach(val => {
                const d = document.createElement('div');
                d.className = `die d${val}`;
                colDiv.appendChild(d);
            });
            div.appendChild(colDiv);
        }
    }

    function showPreview(val) {
        const box = document.getElementById('preview-box');
        box.innerHTML = `<div class="die d${val} mini-die"></div>`;
    }

    function updateStatus(msg) {
        document.getElementById('status').innerText = msg;
    }

    function endGame() {
        state.over = true;
        const s1 = calcScore(state.p1);
        const s2 = calcScore(state.p2);
        const msg = s1 > s2 ? "PLAYER 1 WINS!" : (s2 > s1 ? "OPPONENT WINS!" : "DRAW!");
        updateStatus(msg);
        const btn = document.getElementById('roll-btn');
        btn.innerText = "RESTART";
        btn.disabled = false;
        btn.onclick = () => location.reload();
    }

    function resizeGame() {
        const game = document.getElementById('game-wrapper');
        const h = window.innerHeight;
        // Base height needed approx 1200px
        const scale = Math.min(1, (h - 100) / 1200);
        game.style.transform = `scale(${scale})`;
    }

    window.onresize = resizeGame;

</script>
</body>
</html>
